<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<title>Game Over</title>

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/gameover.css">

</head>

<body>

<div class="gameover-card">

<h1>🎉 Game Over</h1>

<h2>Your Final Score</h2>

<h3 id="finalScore">185</h3>

<input
type="text"
id="playerName"
placeholder="Enter your name">

<div class="gameover-buttons">

    <button
        id="saveBtn"
        class="gameover-btn save-btn">
        Save Score
    </button>

    <button
        id="playAgainBtn"
        class="gameover-btn play-again-btn">
        Play Again
    </button>

    <button
        id="homeBtn"
        class="gameover-btn home-btn">
        Home
    </button>

</div>

</div>

<script src="js/leaderboard.js"></script>
<script src="js/gameover.js"></script>

</body>

</html>
